<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Department of Equinox</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
            color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            margin: 0 0 30px 0;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-align: center;
        }
        .equinox-btn {
            background-color: #1a1a1a;
            color: #ffffff;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            outline: none;
            transition: background-color 1s ease, color 1s ease, font-size 1s ease;
        }
        .equinox-btn.faded {
            background-color: transparent !important;
            color: #000000;
            font-size: 1.75rem;
            font-weight: 700;
            cursor: default;
            pointer-events: none;
        }
        #payment-container {
            margin-top: 40px;
            max-width: 800px;
            text-align: center;
            font-size: 1.1rem;
            line-height: 1.5;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        #payment-container.visible {
            opacity: 1;
        }
        .typing-text {
            display: inline-block;
            white-space: pre-wrap;
        }
        .char {
            opacity: 0;
            transition: opacity 0.4s ease;
            color: #000000;
        }
        #yt-audio-container {
            position: absolute;
            width: 0;
            height: 0;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <h1>The Department of Equinox</h1>
    <button id="appointmentBtn" class="equinox-btn">Schedule an Appointment with Father Equinox</button>
    <div id="payment-container">
        <div id="payment-text" class="typing-text"></div>
    </div>
    <div id="yt-audio-container"></div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-audio-container', {
                height: '0',
                width: '0',
                videoId: 'KJotmmDJWAg',
                playerVars: { 'playsinline': 1 }
            });
        }

        const btn = document.getElementById('appointmentBtn');
        const paymentContainer = document.getElementById('payment-container');
        const paymentText = document.getElementById('payment-text');
        const paymentList = "Venmo, CashApp, PayPal, Apple Pay, Google Pay, Samsung Pay, Zelle, Stripe, Square, Skrill, Neteller, Payoneer, Alipay, WeChat Pay, Klarna, Afterpay, Affirm, Sezzle, ClearPay, Openpay, Laybuy, Zip, Shopify Payments, Amazon Pay, Dwolla, TransferWise (Wise), WorldRemit, Remitly, Ria, Paysafecard, Neosurf, BitPay, Coinbase Commerce Venmo, CashApp, PayPal, Apple Pay, Google Pay, Samsung Pay, Zelle, Stripe, Square, Skrill, Neteller, Payoneer, Alipay, WeChat Pay, Klarna, Afterpay, Affirm, Sezzle, ClearPay, Openpay, Laybuy, Zip, Shopify Payments, Amazon Pay, Dwolla, TransferWise (Wise), WorldRemit, Remitly, Ria, Paysafecard, Neosurf, BitPay, Coinbase Commerce Venmo, CashApp, PayPal, Apple Pay, Google Pay, Samsung Pay, Zelle, Stripe, Square, Skrill, Neteller, Payoneer, Alipay, WeChat Pay, Klarna, Afterpay, Affirm, Sezzle, ClearPay, Openpay, Laybuy, Zip, Shopify Payments, Amazon Pay, Dwolla, TransferWise (Wise), WorldRemit, Remitly, Ria, Paysafecard, Neosurf, BitPay, Coinbase Commerce Venmo, CashApp, PayPal, Apple Pay, Google Pay, Samsung Pay, Zelle, Stripe, Square, Skrill, Neteller, Payoneer, Alipay, WeChat Pay, Klarna, Afterpay, Affirm, Sezzle, ClearPay, Openpay, Laybuy, Zip, Shopify Payments, Amazon Pay, Dwolla, TransferWise (Wise), WorldRemit, Remitly, Ria, Paysafecard, Neosurf, BitPay, Coinbase Commerce Venmo, CashApp, PayPal, Apple Pay, Google Pay, Samsung Pay, Zelle, Stripe, Square, Skrill, Neteller, Payoneer, Alipay, WeChat Pay, Klarna, Afterpay, Affirm, Sezzle, ClearPay, Openpay, Laybuy, Zip, Shopify Payments, Amazon Pay, Dwolla, TransferWise (Wise), WorldRemit, Remitly, Ria, Paysafecard, Neosurf, BitPay, Coinbase Commerce Venmo, CashApp, PayPal, Apple Pay, Google Pay, Samsung Pay, Zelle, Stripe, Square, Skrill, Neteller, Payoneer, Alipay, WeChat Pay, Klarna, Afterpay, Affirm, Sezzle, ClearPay, Openpay, Laybuy, Zip, Shopify Payments, Amazon Pay, Dwolla, TransferWise (Wise), WorldRemit, Remitly, Ria, Paysafecard, Neosurf, BitPay, Coinbase Commerce";
        
        var dynamicClickToken = false;

        btn.addEventListener('click', () => {
            if (!dynamicClickToken) {
                dynamicClickToken = true;
                
                if (player && typeof player.playVideo === 'function') {
                    player.playVideo();
                }
                
                btn.classList.add('faded');
                btn.textContent = "$2,500,000,000";

                paymentContainer.classList.add('visible');
                
                paymentText.innerHTML = '';
                for (let char of paymentList) {
                    const span = document.createElement('span');
                    span.className = 'char';
                    span.textContent = char;
                    paymentText.appendChild(span);
                }
                
                const chars = paymentText.querySelectorAll('.char');
                chars.forEach((char, index) => {
                    setTimeout(() => {
                        char.style.opacity = '1';
                    }, index * 35);
                });
            }
        });
    </script>
</body>
</html>
